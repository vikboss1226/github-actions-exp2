name: 01-github-action
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: welcome
        run: echo "this is welcome"

  second-job:
    needs: first-job
    runs-on: ubuntu-latest
    steps:
      - name: second-step
        run: |
          echo "hello world"
          echo "testing...."

  third-job:
    runs-on: windows-latest
    steps:
      - name: windows-step
        shell: bash
        run: |
          echo "this is windows shell..."
