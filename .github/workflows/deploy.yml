name: Event Filters Demo

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - closed

jobs:
  event-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Display Event Information
        run: |
          echo "GitHub Actions Event Filter Demo"
          echo "Event Name: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Merge Type: ${{github.action_status}}"
          echo "Workflow executed successfully!"
